unet:
  _target_: monai.networks.nets.UNet
  spatial_dims: 2
  in_channels: 3
  out_channels: 1
  channels: [32, 64, 128, 256, 512]
  strides: [2, 2, 2, 2]
  num_res_units: 2

unet_plus_plus:
  _target_: monai.networks.nets.BasicUNetPlusPlus
  spatial_dims: 2
  in_channels: 3
  out_channels: 1
  features: [32, 64, 128, 256, 512, 32]
  deep_supervision: False

swin_unet:
    _target_: surgical_copilot.models.vision_trasformer_swin.swin_unet.SwinUnet 
    img_size: [640, 480]
    in_chans: 3
    num_classes: 1
    window_size: 8
  
swin_unetr:
    _target_: monai.networks.nets.SwinUNETR
    img_size: [640, 480]
    in_channels: 3
    out_channels: 1
    feature_size: 48
    spatial_dims: 2 # generally SwinUNETR is used with 3D image. In this way we can manage 2D frame
    use_checkpoint: True

yolo_v8_seg:
  _target_: surgical_copilot.models.yolov8_seg.yolov8_seg_wrapper.CustomYOLOSemantic
  num_classes: 1
  num_masks: 32

yolo_v8_seg_temporal:
  _target_: surgical_copilot.models.yolov8_seg.yolov8_seg_wrapper.CustomYOLOSemantic
  in_channels: 4   # 3 channels RGB + 1 mask t-1 channel
  num_classes: 1
  num_masks: 32
  is_temporal: true
  temporal_mode: "early_fusion"
  temporal_target_layer: "yolo.backbone.stem.0.conv.weight"

yolo_late_fusion:
  _target_: surgical_copilot.models.yolov8_seg.yolov8_seg_wrapper.YOLOLateFusionConvGRU
  in_channels: 3
  num_classes: 1
  num_masks: 32
  freeze_backbone: True
  is_temporal: true
  temporal_mode: "recurrent"
  warmup_epochs: 5
  pretrained_weights_path: "results/best_YOLOv8Segmenter_fold{fold_idx}.pth"

r_unet_gru:
  _target_: surgical_copilot.models.Recurrent_U_Net.recurrent_u_net.RecurrentUNet
  spatial_dims: 2
  in_channels: 3
  out_channels: 1
  channels: [32, 64, 128, 256, 512]
  strides: [2, 2, 2, 2]
  recurrent_type: "gru"
  num_res_units: 2
  freeze_backbone: True
  is_temporal: true
  temporal_mode: "recurrent"
  warmup_epochs: 5
  pretrained_weights_path: "weights/Unet/best_fold0.pth"

r_unet_lstm:
  _target_: surgical_copilot.models.Recurrent_U_Net.recurrent_u_net.RecurrentUNet
  spatial_dims: 2
  in_channels: 3
  out_channels: 1
  channels: [32, 64, 128, 256, 512]
  strides: [2, 2, 2, 2]
  recurrent_type: "lstm"
  num_res_units: 2
  freeze_backbone: True
  is_temporal: true
  temporal_mode: "recurrent"
  warmup_epochs: 5
  pretrained_weights_path: "weights/Unet/best_fold0.pth"